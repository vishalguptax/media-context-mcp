name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing + MCP Registry OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing needs a recent npm (>= 11.5.1).
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build
      - run: npm test

      # No NODE_AUTH_TOKEN — npm exchanges the OIDC token for a short-lived
      # credential automatically when this repo/workflow is a trusted publisher.
      - name: Publish to npm
        run: npm publish

      # --- Publish to the official MCP Registry (OIDC, no secrets) ---
      - name: Sync server.json version to the release tag
        if: github.ref_type == 'tag'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Install mcp-publisher
        run: curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
